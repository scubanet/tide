name: Tide — Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macos-15 ships Xcode 16+ for Swift 6.0. macos-14 is stuck on
    # Xcode 15.4 / Swift 5.10 and can't build our packages.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test Swift Packages
        run: |
          for pkg in Core LLM Speech Selection Hotkeys; do
            echo "::group::Testing $pkg"
            (cd Packages/$pkg && swift test) || exit 1
            echo "::endgroup::"
          done

      - name: Build Tide app
        run: |
          xcodebuild build \
            -project Tide.xcodeproj \
            -scheme Tide \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO
